<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head(${titulo})"></head>
<body>
    <nav th:replace="fragments/navbar :: navbar('motas')"></nav>

<main class="container py-4" data-page="motas-form">
    <div class="row justify-content-center">
        <div class="col-xl-9">

            <section class="app-hero mb-4">
                <div class="app-hero-copy">
                    <span class="badge text-bg-light mb-3"
                          th:text="${modo == 'editar'} ? 'Edicao' : 'Nova mota'">Nova mota</span>

                    <h1 class="display-6 mb-2" th:text="${titulo}">Nova Mota</h1>

                    <p class="text-secondary mb-0">
                        A imagem fica guardada no servidor e a mota recebe um
                        <code>codigoUnico</code> para uso em QR code.
                    </p>
                </div>

                <div class="app-hero-actions">
                    <a class="btn btn-outline-light btn-lg" th:href="@{/motas}">
                        Voltar à lista
                    </a>
                </div>
            </section>

            <div id="feedback" class="mb-3"></div>

                <section class="card shadow-sm border-0">
                    <div class="card-body p-4 p-lg-5">
                <form id="motaForm"
                    th:object="${motaForm}"
                    th:action="${modo == 'editar'} ? @{/motas/{id}(id=${mota.id})} : @{/motas}"
                    method="post"
                    enctype="multipart/form-data">

                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" id="maxImagemBytes" value="1048576">

                    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger mb-4">
                        <p class="mb-0" th:each="erro : ${#fields.globalErrors()}" th:text="${erro}">Erro</p>
                    </div>

                    <div class="row g-4 g-lg-4">

                        <div class="col-md-6">
                            <label class="form-label" for="marca">Marca</label>
                            <input type="text" class="form-control"
                                   id="marca"
                                   th:field="*{marca}"
                                   maxlength="25"
                                   required>

                            <div class="invalid-feedback d-block"
                                 th:if="${#fields.hasErrors('marca')}"
                                 th:errors="*{marca}">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="modelo">Modelo</label>
                            <input type="text" class="form-control"
                                   id="modelo"
                                   th:field="*{modelo}"
                                   maxlength="25"
                                   required>

                            <div class="invalid-feedback d-block"
                                 th:if="${#fields.hasErrors('modelo')}"
                                 th:errors="*{modelo}">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="cilindrada">Cilindrada</label>
                            <input type="text"
                                   class="form-control"
                                   id="cilindrada"
                                   th:field="*{cilindrada}"
                                   placeholder="Ex: 125cc"
                                   required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="ano">Ano</label>
                            <input type="number"
                                   class="form-control"
                                   id="ano"
                                   th:field="*{ano}"
                                   placeholder="Ex: 2018">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="kilometragem">Kilometragem</label>
                            <input type="number"
                                   class="form-control"
                                   id="kilometragem"
                                   th:field="*{kilometragem}"
                                   placeholder="Ex: 12000">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="cost">Preço</label>
                            <input type="number"
                                   class="form-control"
                                   id="cost"
                                   th:field="*{cost}"
                                   placeholder="Ex: 2500"
                                   step="0.01"
                                   min="0"
                                   required>

                            <div class="invalid-feedback d-block"
                                 th:if="${#fields.hasErrors('cost')}"
                                 th:errors="*{cost}">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="cor">Cor</label>
                            <input type="text"
                                   class="form-control"
                                   id="cor"
                                   th:field="*{cor}"
                                   placeholder="Ex: Azul">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="imagem">Imagem da mota</label>

                            <input type="file"
                                   class="form-control"
                                   id="imagem"
                                   th:field="*{imagem}"
                                   accept="image/*"
                                   capture="environment">

                            <div class="form-text">
                                No telemóvel podes tirar foto diretamente da mota.
                            </div>

                            <img id="novaImagemPreview"
                                 class="mota-preview d-none mt-3"
                                 alt="Preview da nova imagem">
                        </div>

                        <div class="col-md-6"
                             th:if="${mota != null and mota.imagemPath != null}">

                            <label class="form-label d-block">
                                Imagem atual
                            </label>

                            <img class="mota-preview"
                                 th:src="@{/uploads/{img}(img=${mota.imagemPath})}"
                                 alt="Imagem atual da mota">
                        </div>

                        <div class="col-md-6"
                             th:if="${mota != null}">

                            <label class="form-label d-block">
                                Codigo unico
                            </label>

                            <div class="qr-code-label"
                                 th:text="${mota.codigoUnico}">
                                uuid
                            </div>
                        </div>

                        <div class="col-md-12 form-section-divider">
                            <label class="form-label" for="adminApiKey">
                                Chave de administrador
                            </label>

                            <input type="password"
                                   class="form-control"
                                   id="adminApiKey"
                                   th:field="*{adminApiKey}"
                                   placeholder="Obrigatoria para criar ou atualizar">

                            <div class="invalid-feedback d-block"
                                 th:if="${#fields.hasErrors('adminApiKey')}"
                                 th:errors="*{adminApiKey}">
                            </div>
                        </div>

                        <div class="col-sm-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input"
                                       type="checkbox"
                                       id="garantia"
                                       th:field="*{garantia}">
                                <label class="form-check-label" for="garantia">
                                    Garantia ativa
                                </label>
                            </div>
                        </div>

                        <div class="col-sm-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input"
                                       type="checkbox"
                                       id="seguro"
                                       th:field="*{seguro}">
                                <label class="form-check-label" for="seguro">
                                    Seguro ativo
                                </label>
                            </div>
                        </div>

                    </div>

                    <div class="form-actions mt-5">
                        <button type="submit"
                                class="btn btn-primary px-4"
                                th:text="${modo == 'editar'} ? 'Atualizar' : 'Guardar'">
                            Guardar
                        </button>

                        <a class="btn btn-outline-secondary px-4"
                           th:href="@{/motas}">
                           Cancelar
                        </a>
                    </div>

                </form>

            </div>
        </section>

        </div>
    </div>
</main>

<div th:replace="fragments/scripts :: scripts(${pageScript})"></div>

</body>
</html>
